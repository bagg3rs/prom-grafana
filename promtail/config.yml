server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /Users/rb/observability/promtail/positions.yaml

clients:
  - url: http://192.168.0.185:3100/loki/api/v1/push

scrape_configs:
  - job_name: observability-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: observability
          host: mac-mini
          __path__: /Users/rb/observability/logs/*.log

  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          host: mac-mini
          __path__: /var/log/system.log

  - job_name: edgerouter-syslog
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: udp
      idle_timeout: 60s
      syslog_format: rfc3164
      label_structured_data: true
      labels:
        job: syslog
        host: edgerouter
    relabel_configs:
      - source_labels: [__syslog_message_hostname]
        target_label: hostname
      - source_labels: [__syslog_message_facility]
        target_label: facility
      - source_labels: [__syslog_message_severity]
        target_label: severity
