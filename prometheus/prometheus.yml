global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'homeassistant'
    scrape_interval: 30s
    metrics_path: /api/prometheus
    authorization:
      credentials: "${HASS_TOKEN}"
    static_configs:
      - targets: ['192.168.0.201:8123']

  - job_name: 'node-exporter-pi'
    scrape_interval: 60s
    static_configs:
      - targets: ['192.168.0.30:9100']

  - job_name: 'node-exporter-macmini'
    scrape_interval: 30s
    static_configs:
      - targets: ['192.168.0.50:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'mac-mini'

  - job_name: 'node-exporter-sp3'
    scrape_interval: 60s
    static_configs:
      - targets: ['192.168.0.170:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'sp3'

  - job_name: 'traefik'
    scrape_interval: 30s
    static_configs:
      - targets: ['192.168.0.185:8082']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'traefik-nas'

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://obsidian.onelumen.co.uk
        - https://grafana.onelumen.co.uk
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.0.185:9115

  - job_name: 'snmp_fw01'
    scrape_interval: 60s
    static_configs:
      - targets: ['192.168.0.254']  # fw01 — EdgeRouter X SFP
    metrics_path: /snmp
    params:
      module: [if_mib]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.0.185:9116  # snmp_exporter on NAS
